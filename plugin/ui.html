<!-- plugin/ui.html -->
<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 12px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-dot.connected { background: #1bc47d; }
    .status-dot.connecting { background: #f5a623; animation: pulse 1s infinite; }
    .status-dot.error { background: #f24822; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .status-text {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }
    .field {
      margin-bottom: 8px;
    }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .field .value {
      font-size: 12px;
      color: #333;
    }
    .server-url {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .server-url input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
    }
    .server-url button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #18a0fb;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }
    .server-url button:hover { background: #0d8ce0; }
    .server-url button:disabled { background: #ccc; cursor: not-allowed; }
    .log {
      margin-top: 12px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
      max-height: 120px;
      overflow-y: auto;
    }
    .log-entry { margin-bottom: 2px; }
    .log-entry.error { color: #f24822; }
    .log-entry.success { color: #1bc47d; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>figma-mcp-write</h1>
  </div>

  <div class="status-text" id="statusText">Disconnected</div>

  <div class="server-url">
    <input type="text" id="serverUrl" value="ws://localhost:3846" placeholder="ws://localhost:3846" />
    <button id="connectBtn" onclick="handleConnect()">Connect</button>
  </div>

  <div id="fileInfo" style="display:none;">
    <div class="field">
      <label>File</label>
      <div class="value" id="fileName">—</div>
    </div>
    <div class="field">
      <label>Nodes</label>
      <div class="value" id="nodeCount">—</div>
    </div>
    <div class="field">
      <label>Commands Processed</label>
      <div class="value" id="commandCount">0</div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <script>
    let commandCount = 0;

    function addLog(message, type) {
      const log = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + (type || '');
      entry.textContent = new Date().toLocaleTimeString() + ' ' + message;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function setStatus(status, text) {
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      dot.className = 'status-dot ' + status;
      statusText.textContent = text;
    }

    function handleConnect() {
      const url = document.getElementById('serverUrl').value;
      parent.postMessage({ pluginMessage: { type: 'connect', url: url } }, '*');
    }

    window.onmessage = function(event) {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'status':
          setStatus(msg.status, msg.text);
          if (msg.status === 'connected') {
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('connectBtn').textContent = 'Disconnect';
          } else {
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('connectBtn').textContent = 'Connect';
          }
          break;
        case 'fileInfo':
          document.getElementById('fileName').textContent = msg.name;
          document.getElementById('nodeCount').textContent = msg.nodeCount;
          break;
        case 'commandExecuted':
          commandCount++;
          document.getElementById('commandCount').textContent = commandCount;
          addLog('✓ ' + msg.command, 'success');
          break;
        case 'commandError':
          addLog('✗ ' + msg.command + ': ' + msg.error, 'error');
          break;
        case 'log':
          addLog(msg.message, msg.level);
          break;
      }
    };

    addLog('Plugin loaded. Click Connect to start.');
  </script>
</body>
</html>
